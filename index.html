<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messenger para vos</title>
  <style>
    :root {
      --msn-blue: #ee6fa8;
      --msn-blue-dark: #a93366;
      --msn-cyan: #ffd3e5;
      --msn-green: #52b447;
      --msn-yellow: #ffd85a;
      --window: #fff7fb;
      --window-soft: #ffe4f0;
      --line: #efabc9;
      --text: #4b1730;
      --muted: #8b5570;
      --pink: #ff6aa2;
      --heart: #d92f68;
      --shadow: 0 24px 60px rgba(135, 42, 85, .28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Tahoma, "MS Sans Serif", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 216, 90, .34), transparent 24rem),
        radial-gradient(circle at 84% 18%, rgba(126, 215, 255, .34), transparent 26rem),
        linear-gradient(135deg, #fff8fb 0%, #ffd5e7 46%, #ffeef6 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .desktop {
      width: min(100%, 920px);
      min-height: min(760px, calc(100vh - 56px));
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .window {
      border: 1px solid var(--msn-blue-dark);
      border-radius: 7px 7px 4px 4px;
      background: var(--window);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .titlebar {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px 6px 11px;
      color: #fff;
      background: linear-gradient(#ffabd0, #e55391 54%, #af356e);
      text-shadow: 0 1px 0 rgba(0, 0, 0, .24);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 700;
      font-size: 13px;
    }

    .buddy-icon {
      position: relative;
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: linear-gradient(#b6f59e, #35a33a);
      border: 1px solid rgba(0, 0, 0, .18);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, .55);
    }

    .buddy-icon::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f5ffe9;
    }

    .buddy-icon::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: 2px;
      height: 8px;
      border-radius: 50% 50% 40% 40%;
      background: #eaffdc;
    }

    .window-buttons {
      display: flex;
      gap: 4px;
      flex: 0 0 auto;
    }

    .win-btn {
      width: 23px;
      height: 20px;
      border: 1px solid rgba(14, 58, 91, .72);
      border-radius: 3px;
      color: #073458;
      background: linear-gradient(#fff7fb, #ffc6dd);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .95);
      cursor: default;
      line-height: 1;
      padding: 0;
    }

    .win-btn.close {
      color: #fff;
      background: linear-gradient(#ff9c8f, #e0442f);
    }

    .login-window {
      position: fixed;
      inset: 50% auto auto 50%;
      z-index: 20;
      width: min(92vw, 430px);
      transform: translate(-50%, -50%);
      transition: opacity .45s ease, transform .45s ease, visibility .45s;
    }

    .login-window.is-hidden {
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -44%) scale(.96);
      pointer-events: none;
    }

    .login-body {
      padding: 28px 24px 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .86), rgba(226, 245, 255, .9)),
        var(--window);
      text-align: center;
    }

    .msn-logo {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      filter: drop-shadow(0 8px 12px rgba(14, 83, 132, .22));
    }

    .msn-dot {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      box-shadow: inset 0 4px 0 rgba(255, 255, 255, .38);
      animation: floaty 1.8s ease-in-out infinite;
    }

    .dot-blue {
      left: 5px;
      top: 7px;
      background: linear-gradient(#81ddff, #147fd4);
    }

    .dot-green {
      right: 5px;
      top: 14px;
      background: linear-gradient(#b6f498, #35a83f);
      animation-delay: .14s;
    }

    .dot-red {
      left: 17px;
      bottom: 4px;
      background: linear-gradient(#ff9bbc, #e94273);
      animation-delay: .28s;
    }

    .dot-yellow {
      right: 16px;
      bottom: 0;
      background: linear-gradient(#ffec86, #f3b71b);
      animation-delay: .42s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .login-body h1 {
      margin: 0 0 8px;
      font-size: clamp(22px, 5vw, 32px);
      letter-spacing: 0;
    }

    .login-body p {
      margin: 0 auto 20px;
      max-width: 32ch;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      text-align: left;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .field input {
      min-height: 34px;
      border: 1px solid #dfa0bd;
      border-radius: 3px;
      padding: 7px 9px;
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 1px 4px rgba(119, 20, 67, .14);
      cursor: default;
      user-select: none;
    }

    .field input[readonly] {
      background: linear-gradient(#fff, #fff3f8);
    }

    .login-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .login-actions .msn-button {
      min-width: 150px;
    }

    .msn-button {
      border: 1px solid #a72f68;
      border-radius: 4px;
      padding: 8px 16px;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(#ffa6ca, #e65391 55%, #b0346f);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65), 0 2px 4px rgba(130, 36, 80, .22);
      cursor: pointer;
    }

    .ghost-button {
      border: 1px solid #e4a4c0;
      border-radius: 4px;
      padding: 8px 13px;
      color: #70314f;
      background: linear-gradient(#fff, #ffe1ee);
      cursor: pointer;
    }

    .login-status {
      min-height: 20px;
      margin-top: 16px;
      color: var(--msn-blue-dark);
      font-size: 12px;
    }

    .progress {
      width: 100%;
      height: 12px;
      margin-top: 12px;
      border: 1px solid #78abd0;
      background: #fff;
      box-shadow: inset 0 1px 3px rgba(21, 81, 123, .2);
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: repeating-linear-gradient(90deg, #50bd54 0 12px, #8ee36b 12px 24px);
      transition: width .28s ease;
    }

    .main-window,
    .chat-window {
      opacity: 0;
      transform: translateY(18px) scale(.98);
      transition: opacity .45s ease .15s, transform .45s ease .15s;
    }

    .is-signed-in .main-window,
    .is-signed-in .chat-window {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .profile {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(120deg, rgba(255, 190, 218, .78), rgba(255, 255, 255, .68)),
        var(--window-soft);
    }

    .avatar {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px solid #dc8fb2;
      border-radius: 5px;
      background: linear-gradient(#fff, #ffe1ee);
      font-size: 36px;
      box-shadow: inset 0 1px 0 #fff;
    }

    .profile-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 52% 38%;
      border-radius: 3px;
    }

    .profile-name {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .status-line {
      margin: 0 0 8px;
      color: #725022;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status-select {
      width: 100%;
      border: 1px solid #dda0bc;
      border-radius: 3px;
      padding: 5px;
      color: var(--text);
      background: #fff;
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(#fff8fb, #ffe1ef);
    }

    .tool {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #dea2bd;
      border-radius: 3px;
      padding: 5px 8px;
      color: #71314f;
      background: linear-gradient(#fff, #ffe5f0);
      font-size: 12px;
      cursor: pointer;
    }

    .contact-list {
      padding: 8px 0 12px;
      background: #fff;
    }

    .group-label {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      color: #84385b;
      font-weight: 700;
      font-size: 12px;
      background: linear-gradient(90deg, #ffe2ef, transparent);
    }

    .contact {
      width: 100%;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 7px;
      align-items: start;
      border: 0;
      padding: 7px 12px;
      color: var(--text);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .contact:hover,
    .contact.is-active {
      background: linear-gradient(90deg, #ffe8f2, #fff9fc);
    }

    .contact .buddy-icon {
      width: 18px;
      height: 18px;
      margin-top: 1px;
    }

    .name {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .personal {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .msn-emote {
      width: 21px;
      height: 21px;
      display: inline-block;
      vertical-align: -5px;
      object-fit: contain;
      image-rendering: auto;
    }

    .name .msn-emote,
    .personal .msn-emote,
    .profile-name .msn-emote,
    .status-line .msn-emote,
    .chat-title .msn-emote,
    .chat-subtitle .msn-emote,
    .message-name .msn-emote {
      width: 18px;
      height: 18px;
      vertical-align: -4px;
    }

    .avatar .msn-emote,
    .chat-avatar .msn-emote {
      width: 34px;
      height: 34px;
      vertical-align: middle;
    }

    .offline .buddy-icon {
      filter: grayscale(1);
      opacity: .55;
    }

    .chat-window {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 560px;
    }

    .chat-head {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 11px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #fff, #ffe3ef);
    }

    .chat-avatar {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border: 1px solid #dc8fb2;
      border-radius: 5px;
      background: linear-gradient(#fff, #ffe1ee);
      font-size: 30px;
    }

    .chat-title {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.28;
      overflow-wrap: anywhere;
    }

    .chat-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .messages {
      min-height: 340px;
      padding: 15px;
      background:
        linear-gradient(rgba(255, 255, 255, .78), rgba(255, 255, 255, .78)),
        repeating-linear-gradient(0deg, #f8fcff 0 28px, #eef8ff 28px 29px);
      overflow: hidden;
    }

    .message {
      max-width: 88%;
      margin: 0 0 11px;
      animation: pop .28s ease both;
    }

    .message.me {
      margin-left: auto;
      text-align: right;
    }

    .message-name {
      display: block;
      margin-bottom: 3px;
      color: #0e659e;
      font-size: 11px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .bubble {
      display: inline-block;
      border: 1px solid #e6a9c2;
      border-radius: 5px;
      padding: 8px 10px;
      background: linear-gradient(#fff, #fff1f7);
      color: var(--text);
      box-shadow: 0 2px 5px rgba(128, 28, 82, .12);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .message.me .bubble {
      border-color: #f2aec8;
      background: linear-gradient(#fff8fb, #ffe4ee);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .composer {
      border-top: 1px solid var(--line);
      background: linear-gradient(#fff1f7, #ffddea);
    }

    .composer-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px 0;
    }

    .compose-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px 10px 10px;
    }

    .compose-row input {
      min-height: 38px;
      border: 1px solid #dfa0bd;
      border-radius: 4px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    .shake {
      animation: nudge .42s linear;
    }

    @keyframes nudge {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-9px, 0); }
      30% { transform: translate(9px, 0); }
      45% { transform: translate(-7px, 0); }
      60% { transform: translate(7px, 0); }
      75% { transform: translate(-4px, 0); }
      90% { transform: translate(4px, 0); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 30;
      max-width: min(92vw, 430px);
      border: 1px solid #a93366;
      border-radius: 6px;
      padding: 10px 13px;
      color: #fff;
      background: linear-gradient(#ff9ec6, #d94f87);
      box-shadow: 0 10px 28px rgba(121, 35, 76, .28);
      transform: translate(-50%, 24px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      font-size: 13px;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .heart {
      position: absolute;
      color: var(--heart);
      animation: rise 1.8s ease-in forwards;
      font-size: 20px;
      text-shadow: 0 2px 5px rgba(255, 255, 255, .8);
    }

    @keyframes rise {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(.72) rotate(-8deg);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-160px) scale(1.25) rotate(10deg);
      }
    }

    @media (max-width: 760px) {
      .page {
        align-items: start;
        padding: 10px;
      }

      .desktop {
        width: 100%;
        min-height: 0;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .chat-window {
        min-height: 0;
      }

      .message {
        max-width: 96%;
      }

      .compose-row {
        grid-template-columns: 1fr;
      }

      .profile {
        grid-template-columns: 58px minmax(0, 1fr);
      }

      .avatar {
        width: 58px;
        height: 58px;
        font-size: 29px;
      }

      .toolbar,
      .composer-tools {
        gap: 5px;
      }

      .tool {
        flex: 1 1 auto;
        justify-content: center;
        min-width: 96px;
      }

      .messages {
        min-height: 270px;
        padding: 12px;
      }
    }

    @media (max-width: 420px) {
      .login-body {
        padding: 22px 16px 18px;
      }

      .title {
        font-size: 12px;
      }

      .window-buttons {
        gap: 2px;
      }

      .win-btn {
        width: 20px;
      }

      .chat-head {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .chat-avatar {
        width: 48px;
        height: 48px;
        font-size: 25px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <section class="window login-window" id="loginWindow" aria-label="Inicio de sesion">
    <div class="titlebar">
      <div class="title"><span class="buddy-icon" aria-hidden="true"></span>Windows Live Messenger</div>
      <div class="window-buttons" aria-hidden="true">
        <button class="win-btn">_</button>
        <button class="win-btn">□</button>
        <button class="win-btn close">×</button>
      </div>
    </div>
    <div class="login-body">
      <div class="msn-logo" aria-hidden="true">
        <span class="msn-dot dot-blue"></span>
        <span class="msn-dot dot-green"></span>
        <span class="msn-dot dot-red"></span>
        <span class="msn-dot dot-yellow"></span>
      </div>
      <h1>Iniciar sesion</h1>
      <p>Entrando a una cuenta rosa, vieja y llena de detallitos para vos.</p>
      <label class="field">
        Correo electronico
        <input id="email" value="selena04@hotmail.com" autocomplete="off" readonly aria-readonly="true" tabindex="-1">
      </label>
      <label class="field">
        Contrasena
        <input value="TeAmoMor04" autocomplete="off" readonly aria-readonly="true" tabindex="-1">
      </label>
      <div class="login-actions">
        <button class="msn-button" id="loginButton" type="button">Iniciar sesion</button>
      </div>
      <div class="login-status" id="loginStatus">Estado: desconectada</div>
      <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
    </div>
  </section>

  <main class="page" id="app">
    <div class="desktop" id="desktop">
      <section class="window main-window" aria-label="Lista de contactos">
        <div class="titlebar">
          <div class="title"><span class="buddy-icon" aria-hidden="true"></span>Messenger - conectada</div>
          <div class="window-buttons" aria-hidden="true">
            <button class="win-btn">_</button>
            <button class="win-btn">□</button>
            <button class="win-btn close">×</button>
          </div>

    const emotePattern = new RegExp(
      Object.keys(emotes)
        .sort((a, b) => b.length - a.length)
        .map((token) => token.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"))
        .join("|"),
      "g"
    );

    function escapeHTML(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function renderEmotes(text) {
      return escapeHTML(text).replace(emotePattern, (token) => {
        const file = emotes[token];
        return `<img class="msn-emote" src="${file}" alt="${escapeHTML(token)}">`;
      });
    }

    function renderProfile() {
      profileName.innerHTML = renderEmotes(config.profileName);
      profileStatus.innerHTML = renderEmotes(config.profileStatus);
    }

    function makeContact(contact, index, offline = false) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `contact${offline ? " offline" : ""}${index === activeContact && !offline ? " is-active" : ""}`;
      button.innerHTML = `
        <span class="buddy-icon" aria-hidden="true"></span>
        <span>
          <span class="name"></span>
          <span class="personal"></span>
        </span>
      `;
      button.querySelector(".name").innerHTML = `${renderEmotes(contact.avatar)} ${renderEmotes(contact.name)}`;
      button.querySelector(".personal").innerHTML = renderEmotes(contact.status);
      button.addEventListener("click", () => {
        if (offline) {
          showToast(`${contact.name} esta ausente, pero dejo amorcito guardado.`);
          return;
        }
        activeContact = index;
        renderContacts();
        openChat(contact);
      });
      return button;
    }

    function renderContacts() {
      contactsNode.replaceChildren(...config.contacts.map((contact, index) => makeContact(contact, index)));
      offlineNode.replaceChildren(...config.offline.map((contact, index) => makeContact(contact, index, true)));
    }

    function openChat(contact) {
      chatAvatar.innerHTML = renderEmotes(contact.avatar);
      chatWindowTitle.innerHTML = renderEmotes(contact.name);
      chatTitle.innerHTML = renderEmotes(contact.name);
      chatSubtitle.innerHTML = renderEmotes(contact.status);
      messages.replaceChildren();
      addMessage(contact.name, "te acaba de iniciar conversacion (*)", false);
      contact.messages.forEach((text, index) => {
        window.setTimeout(() => addMessage(contact.name, text, false), 280 * (index + 1));
      });
    }

    function addMessage(name, text, mine) {
      const row = document.createElement("div");
      row.className = `message${mine ? " me" : ""}`;
      const sender = mine ? config.herName : name;
      row.innerHTML = `
        <span class="message-name"></span>
        <span class="bubble"></span>
      `;
      row.querySelector(".message-name").innerHTML = renderEmotes(sender);
      row.querySelector(".bubble").innerHTML = renderEmotes(text);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("is-visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 2200);
    }

    function startLogin(fast = false) {
      loginButton.disabled = true;
      const steps = fast ? ["Entrando directo al amor..."] : config.loginSteps;
      let progress = 0;
      bar.style.width = "0%";
      steps.forEach((step, index) => {
        window.setTimeout(() => {
          progress = Math.round(((index + 1) / steps.length) * 100);
          loginStatus.textContent = step;
          bar.style.width = `${progress}%`;
        }, fast ? 120 : 650 * index);
      });
      window.setTimeout(() => {
        loginWindow.classList.add("is-hidden");
        app.classList.add("is-signed-in");
        showToast("Inicio de sesion correcto: tenes un monton de amor esperando.");
        burstHearts();
      }, fast ? 580 : 650 * steps.length + 420);
    }

    function burstHearts() {
      for (let i = 0; i < 22; i += 1) {

        heart.className = "heart";

        heart.style.bottom = `${4 + Math.random() * 28}%`;
        heart.style.animationDelay = `${Math.random() * .35}s`;

    function nudge() {
      chatWindow.classList.remove("shake");
      void chatWindow.offsetWidth;
      chatWindow.classList.add("shake");
      showToast("Le mandaste un zumbido lleno de amor.");
    }

    sendButton.addEventListener("click", () => {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(config.herName, text, true);
      messageInput.value = "";
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendButton.click();
      }
    });

    nudgeButton.addEventListener("click", nudge);
    heartButton.addEventListener("click", burstHearts);
    randomButton.addEventListener("click", () => {
      const phrase = config.randomPhrases[Math.floor(Math.random() * config.randomPhrases.length)];
      messageInput.value = phrase;
      messageInput.focus();
    });

    document.getElementById("mailButton").addEventListener("click", () => showToast("Correo nuevo: 'te amo en todos los formatos posibles'."));
    document.getElementById("winkButton").addEventListener("click", () => showToast("Guino enviado: de esos exagerados del MSN."));
    document.getElementById("sparkButton").addEventListener("click", burstHearts);
    statusSelect.addEventListener("change", () => showToast(`Estado cambiado a: ${statusSelect.value}`));
    loginButton.addEventListener("click", () => startLogin(false));

    renderProfile();
    renderContacts();
    openChat(config.contacts[0]);
  </script>
